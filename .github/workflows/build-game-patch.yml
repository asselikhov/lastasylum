name: Build game patch

# Manually-triggered build of the patched game APK (single universal APK) published to the
# private patch repo's release. The operator first uploads the stock split set (base.apk +
# split_*.apk pulled from a device) as assets of a release tagged "stock-<gameVersion>" in the
# patch repo; this workflow merges, patches, signs, and publishes "game-<gameVersion>".
on:
  workflow_dispatch:
    inputs:
      game_version:
        description: "Installed game versionName, e.g. 1.2.3"
        required: true
      package:
        description: "Game package name"
        required: false
        default: "com.phs.global"
      bridge_version:
        description: "Map bridge version (must match BRIDGE_VERSION in map_fly_bridge.js; leave empty to use JS)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Private repo (owner/repo) that stores stock-* and game-* releases.
      PATCH_REPO: ${{ secrets.GAME_PATCH_REPO }}
      # PAT with read (stock assets) + write (releases) on PATCH_REPO.
      GH_TOKEN: ${{ secrets.GAME_PATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .tmp-tools/package-lock.json

      - name: Install frida-compile toolchain
        working-directory: .tmp-tools
        run: npm ci

      - name: Resolve and verify map bridge version
        id: bridge
        run: |
          set -euo pipefail
          js_file=".tmp-tools/frida/map_fly_bridge.js"
          js_ver=$( { grep -oE "BRIDGE_VERSION[[:space:]]*=[[:space:]]*'[^']+'" "$js_file" || true; } | head -1 | grep -oE "'[^']+'" | tr -d "'" || true)
          input_ver="${{ github.event.inputs.bridge_version }}"
          if [ -z "$input_ver" ]; then
            input_ver="$js_ver"
          fi
          echo "map_fly_bridge.js BRIDGE_VERSION = '${js_ver:-<none>}'"
          echo "manifest bridge_version        = '${input_ver:-<none>}'"
          if [ -z "$js_ver" ] || [ -z "$input_ver" ]; then
            echo "::error::Could not resolve map bridge version."
            exit 1
          fi
          if [ "$input_ver" != "$js_ver" ]; then
            echo "::error::Manifest bridge_version ($input_ver) must match map_fly_bridge.js BRIDGE_VERSION ($js_ver). Leave the workflow input empty or bump both together."
            exit 1
          fi
          echo "Map bridge version for manifest: $js_ver"
          echo "bridge_version=$js_ver" >> "$GITHUB_OUTPUT"

      - name: Download stock split set
        run: |
          mkdir -p stock
          gh release download "stock-${{ github.event.inputs.game_version }}" \
            --repo "$PATCH_REPO" --dir stock --pattern '*.apk'
          ls -la stock

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.PATCH_SIGNING_KEYSTORE_BASE64 }}" | base64 -d > patch.keystore
          test -s patch.keystore

      - name: Build patched universal APK
        id: build
        shell: pwsh
        run: |
          ./.tmp-tools/ci-build-game-patch.ps1 `
            -Package "${{ github.event.inputs.package }}" `
            -GameVersion "${{ github.event.inputs.game_version }}" `
            -InputDir "stock" `
            -OutApk "out/phs-global-${{ github.event.inputs.game_version }}-patched.apk" `
            -Keystore "patch.keystore" `
            -KsAlias "${{ secrets.PATCH_KEY_ALIAS }}" `
            -KsPass "${{ secrets.PATCH_KEYSTORE_PASSWORD }}" `
            -KsKeyPass "${{ secrets.PATCH_KEY_PASSWORD }}" `
            -BridgeVersion "${{ steps.bridge.outputs.bridge_version }}"

      - name: Write patches.json index
        run: |
          VER="${{ github.event.inputs.game_version }}"
          ASSET="phs-global-${VER}-patched.apk"
          cat > out/patches.json <<EOF
          {
            "supported": {
              "gameVersion": "${VER}",
              "tag": "game-${VER}",
              "asset": "${ASSET}",
              "sha256": "${{ steps.build.outputs.sha256 }}",
              "sizeBytes": ${{ steps.build.outputs.size }},
              "bridgeVersion": "${{ steps.bridge.outputs.bridge_version }}"
            }
          }
          EOF
          cat out/patches.json

      - name: Publish release
        run: |
          VER="${{ github.event.inputs.game_version }}"
          BRIDGE="${{ steps.bridge.outputs.bridge_version }}"
          SHA="${{ steps.build.outputs.sha256 }}"
          SIZE="${{ steps.build.outputs.size }}"
          TAG="game-${VER}"
          TITLE="Game patch ${VER} · bridge v${BRIDGE}"
          BUILT="$(date -u '+%Y-%m-%d %H:%M UTC')"
          NOTES=$(cat <<EOF
          Patched universal APK for game **${VER}**.

          - Bridge (patch) version: **v${BRIDGE}**
          - Game version: ${VER}
          - SHA256: \`${SHA}\`
          - Size: ${SIZE} bytes
          - Built: ${BUILT}
          EOF
          )
          # Создаём релиз, если его ещё нет; иначе — обновляем заголовок/заметки.
          # --clobber у upload перезаписывает только ассеты, поэтому заголовок и текст
          # обновляем явно через edit, иначе версия моста на странице релиза «застревает».
          if gh release view "$TAG" --repo "$PATCH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$PATCH_REPO" --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" --repo "$PATCH_REPO" --title "$TITLE" --notes "$NOTES"
          fi
          gh release upload "$TAG" --repo "$PATCH_REPO" \
            "out/phs-global-${VER}-patched.apk" out/patches.json --clobber
