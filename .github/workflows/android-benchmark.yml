name: Android Benchmark

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "mobile-android/**"
      - ".github/workflows/android-benchmark.yml"
  schedule:
    - cron: "0 2 * * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: android-actions/setup-android@v3

      - name: Resolve benchmark gate mode
        run: |
          MODE="report-only"
          echo "BENCHMARK_GATE_MODE=$MODE" >> "$GITHUB_ENV"
          echo "Resolved BENCHMARK_GATE_MODE=$MODE"

      - name: Build benchmark APKs
        working-directory: mobile-android
        run: chmod +x gradlew && ./gradlew :benchmark:assembleDevDebug :benchmark:assembleDevDebugAndroidTest --no-daemon

      - name: Run benchmark tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: cd mobile-android && ./gradlew :benchmark:connectedDevDebugAndroidTest --no-daemon

      - name: Parse benchmark results and compare baseline
        working-directory: mobile-android
        run: python3 benchmark/scripts/benchmark_report.py --root . --baseline benchmark/baseline/dev_debug.json --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Soft-gate regression warning
        if: always()
        working-directory: mobile-android
        run: |
          if [ ! -f "benchmark/results/summary_flags.json" ]; then
            echo "::warning title=Android benchmark::summary_flags.json not found; soft-gate skipped"
            exit 0
          fi
          WARN_COUNT=$(python3 - <<'PY'
import json
from pathlib import Path
f = Path("benchmark/results/summary_flags.json")
data = json.loads(f.read_text(encoding="utf-8"))
print(int(data.get("warningCount", 0)))
PY
          )
          if [ "$WARN_COUNT" -gt 0 ]; then
            echo "::warning title=Android benchmark regression::Detected $WARN_COUNT report-only regression warning(s). See Step Summary."
          else
            echo "No report-only benchmark warnings detected."
          fi
          echo "Benchmark gate mode: $BENCHMARK_GATE_MODE"

      - name: Hard-gate regression fail
        if: always()
        working-directory: mobile-android
        run: |
          if [ "$BENCHMARK_GATE_MODE" != "hard" ]; then
            echo "Hard-gate disabled (mode=$BENCHMARK_GATE_MODE)."
            exit 0
          fi
          if [ ! -f "benchmark/results/summary_flags.json" ]; then
            echo "::error title=Android benchmark hard-gate::summary_flags.json not found; cannot evaluate hard-gate."
            exit 1
          fi
          WARN_COUNT=$(python3 - <<'PY'
import json
from pathlib import Path
f = Path("benchmark/results/summary_flags.json")
data = json.loads(f.read_text(encoding="utf-8"))
print(int(data.get("warningCount", 0)))
PY
          )
          if [ "$WARN_COUNT" -gt 0 ]; then
            echo "::error title=Android benchmark hard-gate::Detected $WARN_COUNT regression warning(s) against baseline."
            exit 1
          fi
          echo "Hard-gate passed: no regressions detected."

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-benchmark-artifacts
          path: |
            mobile-android/benchmark/build/outputs/**
            mobile-android/**/outputs/connected_android_test_additional_output/**
            mobile-android/benchmark/build/reports/**
            mobile-android/benchmark/results/**

      - name: Upload candidate baseline snapshot
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: android-benchmark-baseline-candidate-${{ github.run_id }}
          path: mobile-android/benchmark/results/latest_metrics.json
          if-no-files-found: warn
